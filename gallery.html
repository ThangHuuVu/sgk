<!doctype html>

<head>
  <meta charset="utf-8">

  <title>Kho bìa SGK Việt Nam</title>
  <style>
    :root {
      --ink: #14130f;
      --muted: #6d695f;
      --paper: #f4f0e6;
      --line: rgba(20, 19, 15, 0.18);
      --blue: #285f8f;
      --canvas-w: 4400px;
      --canvas-h: 62000px;
      --zoom: 1;
      --cover-w: 270px;
      --cover-h: 382px;
      --grid-cols: 12;
      --grid-gap-x: 62px;
      --grid-gap-y: 88px;
      --grid-w: calc((var(--grid-cols) * var(--cover-w)) + ((var(--grid-cols) - 1) * var(--grid-gap-x)));
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: scroll;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: var(--paper);
    }

    .zoom-shell {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
    }

    .canvas {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      isolation: isolate;
      transform: scale(var(--zoom));
      transform-origin: 0 0;
    }

    .cover-grid {
      position: absolute;
      top: 460px;
      left: calc((var(--canvas-w) - var(--grid-w)) / 2);
      display: grid;
      width: var(--grid-w);
      grid-template-columns: repeat(var(--grid-cols), var(--cover-w));
      grid-auto-rows: calc(var(--cover-h) + 48px);
      gap: var(--grid-gap-y) var(--grid-gap-x);
      align-items: start;
      justify-content: start;
    }

    .title-block {
      display: flex;
      min-height: calc(var(--cover-h) + 48px);
      grid-column: 4 / span 6;
      grid-row: 6;
      flex-direction: column;
      justify-content: center;
      align-self: stretch;
      text-align: center;
      padding: 0 34px 48px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 46px;
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 20px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .meta {
      margin-top: 26px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
    }

    .specimen {
      position: static;
      display: flex;
      min-height: calc(var(--cover-h) + 48px);
      flex-direction: column;
      align-items: center;
      width: var(--cover-w);
      text-decoration: none;
      color: var(--ink);
      transition: filter 160ms ease;
    }

    .specimen:hover,
    .specimen:focus-visible {
      outline: none;
    }

    .specimen:hover img,
    .specimen:focus-visible img {
      filter: saturate(1.03) contrast(1.04);
    }

    .specimen::before {
      display: none;
    }

    .specimen figure {
      margin: 0;
    }

    .specimen img {
      display: block;
      width: 100%;
      height: var(--cover-h);
      object-fit: contain;
      background: #fffdf7;
      border: 1px solid rgba(20, 19, 15, 0.22);
      box-shadow: 0 18px 35px rgba(20, 19, 15, 0.18);
      filter: saturate(0.94) contrast(1.02);
    }

    .specimen figcaption {
      width: 100%;
      margin: 7px auto 0;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 11px;
      line-height: 1.3;
      text-align: center;
      text-shadow: 0 1px 0 var(--paper);
      overflow-wrap: anywhere;
    }

    .specimen b {
      display: block;
      color: var(--ink);
      font-size: 12px;
      font-weight: 650;
    }
  </style>
</head>

  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }

    const zoomShell = document.querySelector(".zoom-shell");
    const canvasWidth = 4400;
    const canvasHeight = 62000;
    const minZoom = 0.35;
    const maxZoom = 1.6;
    let zoom = 1;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setZoom(nextZoom, anchorX = window.innerWidth / 2, anchorY = window.innerHeight / 2) {
      const normalized = clamp(Math.round(nextZoom * 100) / 100, minZoom, maxZoom);
      const worldX = (window.scrollX + anchorX) / zoom;
      const worldY = (window.scrollY + anchorY) / zoom;

      zoom = normalized;
      document.documentElement.style.setProperty("--zoom", zoom);
      zoomShell.style.width = `${canvasWidth * zoom}px`;
      zoomShell.style.height = `${canvasHeight * zoom}px`;

      window.scrollTo({
        left: worldX * zoom - anchorX,
        top: worldY * zoom - anchorY
      });
    }

    function fitGrid() {
      const gridWidth = document.querySelector(".cover-grid").offsetWidth;
      const margin = 96;
      setZoom((window.innerWidth - margin) / gridWidth);
    }

    function centerTitle() {
      const title = document.querySelector(".title-block");
      const rect = title.getBoundingClientRect();
      const x = window.scrollX + rect.left + rect.width / 2 - window.innerWidth / 2;
      const y = window.scrollY + rect.top + rect.height / 2 - window.innerHeight / 2;
      window.scrollTo(x, y);
    }

    function initializeCanvas() {
      setZoom(1);
      requestAnimationFrame(() => requestAnimationFrame(centerTitle));
    }

    if (document.readyState === "complete") {
      initializeCanvas();
    } else {
      window.addEventListener("load", initializeCanvas);
    }

    window.addEventListener("resize", () => {
      requestAnimationFrame(centerTitle);
    });

    window.addEventListener("wheel", (event) => {
      if (!event.ctrlKey && !event.metaKey) return;

      event.preventDefault();
      const direction = event.deltaY > 0 ? -1 : 1;
      setZoom(zoom + direction * 0.08, event.clientX, event.clientY);
    }, { passive: false });
  </script>
