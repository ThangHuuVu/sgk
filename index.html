    <style>
      @font-face {
        font-display: block;
        font-family: "Danh Da";
        font-style: normal;
        font-weight: 700;
        src: url("/fonts/DanhDa-Bold.woff2") format("woff2");
      }

      .initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 14px;
        color: #716a5e;
        font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background:
          radial-gradient(circle at 18% 8%, rgba(157, 53, 39, 0.07), transparent 24rem),
          linear-gradient(90deg, rgba(236, 226, 209, 0.48), transparent 18%, transparent 82%, rgba(236, 226, 209, 0.48)),
          #f5efe2;
      }

      .initial-loader__spinner {
        width: 28px;
        height: 28px;
        padding: 2px;
        border-radius: 50%;
        background: conic-gradient(
          #9d3527 0deg 90deg,
          #2f5f86 90deg 180deg,
          #3e6d59 180deg 270deg,
          rgba(113, 106, 94, 0.34) 270deg 360deg
        );
        box-shadow: 0 10px 24px rgba(22, 19, 15, 0.1);
        animation: initial-loading-spin 840ms linear infinite;
      }

      .initial-loader__spinner::after {
        display: block;
        width: 100%;
        height: 100%;
        background: #f5efe2;
        border-radius: 50%;
        content: "";
      }

      @keyframes initial-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" class="initial-loader" role="status" aria-live="polite">
      <span class="initial-loader__spinner" aria-hidden="true"></span>
      <span>Đang mở kho bìa</span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
